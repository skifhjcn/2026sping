<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whatieattoday</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ivory: #f0ece0;
      --shadow-out: 6px 6px 14px #c8c4b8, -6px -6px 14px #ffffff;
      --shadow-in: inset 4px 4px 10px #c8c4b8, inset -4px -4px 10px #ffffff;
      --shadow-sm: 3px 3px 8px #c8c4b8, -3px -3px 8px #ffffff;
      --accent: #a89070;
      --text-main: #5a4e3c;
      --text-muted: #9a8e7c;
      --text-light: #bbb0a0;
    }
    body { background: var(--ivory); font-family: 'Caveat', cursive; color: var(--text-main); min-height: 100vh; }
    #app { min-height: 100vh; background: var(--ivory); }

    /* ===== MAIN VIEW ===== */
    #main-view { padding: 20px 16px 32px; }

    .app-header { text-align: center; padding: 20px 0 22px; }
    .app-header h1 {
      font-family: 'Caveat', cursive;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
      line-height: 1.1;
      transform: rotate(-1.5deg);
      display: inline-block;
      margin-bottom: 6px;
    }
    .app-header p {
      font-family: 'Caveat', cursive;
      font-size: 17px;
      color: var(--text-muted);
      transform: rotate(0.8deg);
      display: inline-block;
    }

    .week-nav { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
    .nav-btn {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: var(--ivory); box-shadow: var(--shadow-sm);
      cursor: pointer; font-size: 18px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; transition: box-shadow 0.15s;
    }
    .nav-btn:active { box-shadow: var(--shadow-in); }
    .week-label { font-family: 'Caveat', cursive; font-size: 16px; color: var(--text-muted); min-width: 130px; text-align: center; }

    .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 16px; }
    .day-col { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .day-label { font-family: 'Caveat', cursive; font-size: 14px; color: var(--text-muted); padding: 4px 0 2px; text-align: center; }
    .day-label.today { color: var(--accent); font-weight: 700; }

    .meal-thumb {
      width: 100%; aspect-ratio: 1; border-radius: 14px;
      background: var(--ivory); box-shadow: var(--shadow-sm);
      cursor: pointer; overflow: hidden; position: relative;
      transition: box-shadow 0.15s, transform 0.15s;
      border: none; display: block;
    }
    .meal-thumb:active { box-shadow: var(--shadow-in); transform: scale(0.97); }
    .meal-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; display: block; }
    .default-icon { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .meal-time-label {
      position: absolute; bottom: 3px; left: 0; right: 0;
      text-align: center; font-family: 'Caveat', cursive; font-size: 9px; color: var(--text-muted);
    }
    .meal-thumb.has-photo .meal-time-label,
    .meal-thumb.has-ai .meal-time-label {
      color: rgba(255,255,255,0.92); text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    }

    /* ===== DETAIL VIEW ===== */
    #detail-view {
      display: none; position: fixed; inset: 0;
      background: var(--ivory); z-index: 100; overflow-y: auto; padding: 0 0 40px;
    }
    .detail-header {
      display: flex; align-items: center; padding: 16px 16px 12px; gap: 12px;
      position: sticky; top: 0; background: var(--ivory); z-index: 10;
    }
    .back-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--ivory); box-shadow: var(--shadow-sm);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: var(--text-muted); flex-shrink: 0; transition: box-shadow 0.15s;
    }
    .back-btn:active { box-shadow: var(--shadow-in); }
    .detail-title { font-family: 'Caveat', cursive; font-size: 20px; color: var(--text-main); }
    .detail-subtitle { font-family: 'Caveat', cursive; font-size: 14px; color: var(--text-muted); margin-top: 1px; }

    .photo-upload-area {
      margin: 8px 16px 0; border-radius: 24px; background: var(--ivory);
      box-shadow: var(--shadow-out); aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative; transition: box-shadow 0.15s;
    }
    .photo-upload-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; }
    .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .photo-placeholder p { font-family: 'Caveat', cursive; font-size: 15px; color: var(--text-light); }
    .photo-overlay-btn {
      position: absolute; bottom: 14px; right: 14px;
      background: var(--ivory); box-shadow: var(--shadow-sm); border: none;
      border-radius: 50%; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--accent); font-size: 20px;
    }
    #photo-input { display: none; }

    .ai-preview {
      margin: 8px 16px 0; border-radius: 24px; background: var(--ivory);
      box-shadow: var(--shadow-out); aspect-ratio: 4/3;
      display: none; align-items: center; justify-content: center;
      overflow: hidden; position: relative; flex-direction: column; gap: 8px;
    }
    .ai-preview svg { max-width: 65%; max-height: 65%; }
    .ai-status {
      font-family: 'Caveat', cursive; font-size: 13px; color: var(--text-muted);
      position: absolute; bottom: 12px; left: 0; right: 0; text-align: center;
    }

    .section-label { font-family: 'Caveat', cursive; font-size: 15px; color: var(--text-muted); margin-bottom: 8px; }

    .menu-input-wrap { padding: 16px 16px 0; }
    .menu-row {
      background: var(--ivory); box-shadow: var(--shadow-in); border: none;
      border-radius: 16px; padding: 10px 14px; width: 100%;
      display: flex; align-items: center; gap: 8px;
    }
    .menu-row input {
      background: transparent; border: none; outline: none; flex: 1;
      font-family: 'Caveat', cursive; font-size: 16px; color: var(--text-main);
    }
    .menu-row input::placeholder { color: var(--text-light); }
    .ai-gen-btn {
      background: var(--ivory); box-shadow: var(--shadow-sm); border: none;
      border-radius: 12px; padding: 6px 12px; cursor: pointer;
      font-family: 'Caveat', cursive; font-size: 14px; color: var(--accent);
      white-space: nowrap; transition: box-shadow 0.15s; flex-shrink: 0;
    }
    .ai-gen-btn:active { box-shadow: var(--shadow-in); }
    .ai-gen-btn:disabled { color: var(--text-light); }

    .memo-section { padding: 14px 16px 0; }
    .memo-box {
      background: var(--ivory); box-shadow: var(--shadow-in); border: none;
      border-radius: 18px; padding: 12px 16px; width: 100%; min-height: 80px;
      font-family: 'Caveat', cursive; font-size: 16px; color: var(--text-main);
      resize: none; outline: none; line-height: 1.7;
    }
    .memo-box::placeholder { color: var(--text-light); }

    .tags-section { padding: 14px 16px 0; }
    .tag-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag-chip {
      padding: 5px 14px; border-radius: 20px; background: var(--ivory);
      box-shadow: var(--shadow-sm); font-family: 'Caveat', cursive; font-size: 14px;
      color: var(--text-muted); cursor: pointer; border: none; transition: box-shadow 0.15s;
    }
    .tag-chip.selected { box-shadow: var(--shadow-in); color: var(--accent); }

    .save-btn {
      margin: 20px 16px 0; width: calc(100% - 32px); padding: 14px;
      border-radius: 20px; border: none; background: var(--ivory);
      box-shadow: var(--shadow-out); font-family: 'Caveat', cursive;
      font-size: 20px; color: var(--accent); letter-spacing: 2px;
      cursor: pointer; transition: box-shadow 0.15s;
    }
    .save-btn:active { box-shadow: var(--shadow-in); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
<div id="app">

  <!-- MAIN VIEW -->
  <div id="main-view">
    <div class="app-header">
      <h1>whatieattoday</h1><br>
      <p>오늘의 식사는 어떠셨나요?</p>
    </div>

    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)">&#8249;</button>
      <span class="week-label" id="week-label"></span>
      <button class="nav-btn" onclick="changeWeek(1)">&#8250;</button>
    </div>

    <div class="days-grid" id="days-grid"></div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="detail-view">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">&#8592;</button>
      <div>
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-subtitle" id="detail-subtitle"></div>
      </div>
    </div>

    <div class="photo-upload-area" id="photo-area" onclick="triggerPhoto()">
      <div class="photo-placeholder" id="photo-placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#a89070" stroke-width="1.2" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <p>사진을 탭해서 추가하기</p>
      </div>
      <img id="detail-photo" style="display:none;" alt="meal photo" />
      <button class="photo-overlay-btn" id="photo-overlay-btn" style="display:none;"
        onclick="triggerPhoto(); event.stopPropagation();">+</button>
    </div>

    <div class="ai-preview" id="ai-preview">
      <div id="ai-svg-container" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;"></div>
      <div class="ai-status" id="ai-status"></div>
    </div>

    <input type="file" id="photo-input" accept="image/*" onchange="handlePhoto(event)" />

    <div class="menu-input-wrap">
      <div class="section-label">오늘 뭐 먹었어요?</div>
      <div class="menu-row">
        <input type="text" id="menu-input" placeholder="예: 된장찌개, 삼겹살, 파스타..." />
        <button class="ai-gen-btn" id="ai-gen-btn" onclick="generateAI()">✦ AI 그림</button>
      </div>
    </div>

    <div class="memo-section">
      <div class="section-label">한 줄 일기</div>
      <textarea class="memo-box" id="memo-box" placeholder="맛은 어땠나요?"></textarea>
    </div>

    <div class="tags-section">
      <div class="section-label">기분 태그</div>
      <div class="tag-chips">
        <button class="tag-chip" onclick="toggleTag(this)">맛있었어</button>
        <button class="tag-chip" onclick="toggleTag(this)">건강했어</button>
        <button class="tag-chip" onclick="toggleTag(this)">과식했어</button>
        <button class="tag-chip" onclick="toggleTag(this)">아쉬웠어</button>
        <button class="tag-chip" onclick="toggleTag(this)">특별했어</button>
        <button class="tag-chip" onclick="toggleTag(this)">간단했어</button>
      </div>
    </div>

    <button class="save-btn" onclick="saveEntry()">저 장 하 기</button>
  </div>

</div>

<script>
  const DAYS = ['일','월','화','수','목','금','토'];
  const MEALS = ['아침','점심','저녁'];
  let weekOffset = 0, currentKey = null, diary = {};

  function getWeekDates(offset) {
    const today = new Date();
    const day = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1) + offset * 7);
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }

  function fmt(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function isToday(d) { return fmt(d) === fmt(new Date()); }
  function changeWeek(dir) { weekOffset += dir; renderGrid(); }

  function renderGrid() {
    const dates = getWeekDates(weekOffset);
    const first = dates[0], last = dates[6];
    document.getElementById('week-label').textContent =
      `${first.getMonth()+1}/${first.getDate()} — ${last.getMonth()+1}/${last.getDate()}`;

    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';
    const dayOrder = [1,2,3,4,5,6,0];
    const dayLabels = ['월','화','수','목','금','토','일'];

    dayOrder.forEach((di, idx) => {
      const date = dates[di];
      const col = document.createElement('div');
      col.className = 'day-col';

      const lbl = document.createElement('div');
      lbl.className = 'day-label' + (isToday(date) ? ' today' : '');
      lbl.textContent = dayLabels[idx];
      col.appendChild(lbl);

      MEALS.forEach(meal => {
        const key = `${fmt(date)}-${meal}`;
        const entry = diary[key] || {};
        const btn = document.createElement('button');
        btn.className = 'meal-thumb' + (entry.photo ? ' has-photo' : entry.aiSvg ? ' has-ai' : '');
        btn.onclick = () => openDetail(date, meal, key);

        if (entry.photo) {
          const img = document.createElement('img');
          img.src = entry.photo;
          btn.appendChild(img);
        } else if (entry.aiSvg) {
          const wrap = document.createElement('div');
          wrap.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fdf6e8,#f5edd8);border-radius:14px;';
          wrap.innerHTML = entry.aiSvg;
          const s = wrap.querySelector('svg');
          if (s) { s.style.width = '70%'; s.style.height = '70%'; }
          btn.appendChild(wrap);
        } else {
          const def = document.createElement('div');
          def.className = 'default-icon';
          def.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a89070" stroke-width="1.3" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
          btn.appendChild(def);
        }

        const tl = document.createElement('span');
        tl.className = 'meal-time-label';
        tl.textContent = meal;
        btn.appendChild(tl);
        col.appendChild(btn);
      });

      grid.appendChild(col);
    });
  }

  function openDetail(date, meal, key) {
    currentKey = key;
    const entry = diary[key] || {};
    document.getElementById('detail-title').textContent =
      `${date.getMonth()+1}월 ${date.getDate()}일 ${DAYS[date.getDay()]}요일`;
    document.getElementById('detail-subtitle').textContent = meal;

    const ph = document.getElementById('detail-photo');
    const placeholder = document.getElementById('photo-placeholder');
    const overlayBtn = document.getElementById('photo-overlay-btn');
    const photoArea = document.getElementById('photo-area');
    const aiPreview = document.getElementById('ai-preview');

    if (entry.photo) {
      ph.src = entry.photo; ph.style.display = 'block';
      placeholder.style.display = 'none'; overlayBtn.style.display = 'flex';
      photoArea.style.display = 'flex'; aiPreview.style.display = 'none';
    } else if (entry.aiSvg) {
      photoArea.style.display = 'none'; aiPreview.style.display = 'flex';
      document.getElementById('ai-svg-container').innerHTML = entry.aiSvg;
      const s = document.getElementById('ai-svg-container').querySelector('svg');
      if (s) { s.style.width = '60%'; s.style.height = '60%'; s.style.maxHeight = '200px'; }
      document.getElementById('ai-status').textContent = '✦ AI 생성 픽토그램';
    } else {
      ph.style.display = 'none'; ph.src = '';
      placeholder.style.display = 'flex'; overlayBtn.style.display = 'none';
      photoArea.style.display = 'flex'; aiPreview.style.display = 'none';
    }

    document.getElementById('menu-input').value = entry.menu || '';
    document.getElementById('memo-box').value = entry.memo || '';
    document.querySelectorAll('.tag-chip').forEach(c =>
      c.classList.toggle('selected', (entry.tags || []).includes(c.textContent)));

    document.getElementById('detail-view').style.display = 'block';
    document.getElementById('main-view').style.display = 'none';
    document.getElementById('detail-view').scrollTop = 0;
  }

  function closeDetail() {
    document.getElementById('detail-view').style.display = 'none';
    document.getElementById('main-view').style.display = 'block';
    renderGrid();
  }

  function triggerPhoto() { document.getElementById('photo-input').click(); }

  function handlePhoto(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const src = ev.target.result;
      document.getElementById('detail-photo').src = src;
      document.getElementById('detail-photo').style.display = 'block';
      document.getElementById('photo-placeholder').style.display = 'none';
      document.getElementById('photo-overlay-btn').style.display = 'flex';
      document.getElementById('ai-preview').style.display = 'none';
      document.getElementById('photo-area').style.display = 'flex';
      if (!diary[currentKey]) diary[currentKey] = {};
      diary[currentKey].photo = src;
      diary[currentKey].aiSvg = null;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function toggleTag(el) { el.classList.toggle('selected'); }

  async function generateAI() {
    const menu = document.getElementById('menu-input').value.trim();
    if (!menu) { alert('먼저 메뉴 이름을 입력해주세요!'); return; }

    const btn = document.getElementById('ai-gen-btn');
    btn.disabled = true; btn.textContent = '생성 중...';

    const photoArea = document.getElementById('photo-area');
    const aiPreview = document.getElementById('ai-preview');
    photoArea.style.display = 'none'; aiPreview.style.display = 'flex';
    document.getElementById('ai-svg-container').innerHTML =
      `<div style="text-align:center;font-family:'Caveat',cursive;color:#9a8e7c;font-size:16px;"><span class="spinner">✦</span> 그리는 중...</div>`;
    document.getElementById('ai-status').textContent = '';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Draw a cute minimalist food pictogram as SVG for: "${menu}".

Rules:
- SVG viewBox="0 0 200 200", no width/height attributes
- Warm ivory/beige palette: backgrounds #f5edd8 or #fdf6e8, strokes #a89070 or #8b6f4e, accent fills #d4a574 or #e8c99a or #c4956a
- Cute, rounded, friendly shapes — like a hand-drawn sticker
- NO text, NO labels, NO full-canvas background rectangles
- Stroke-based with thick strokes (stroke-width 3-5), rounded linecaps and linejoin
- 1-3 main food elements, centered in the canvas
- Return ONLY the SVG code, nothing else`
          }]
        })
      });

      const data = await res.json();
      const svgText = (data.content || []).map(b => b.text || '').join('').trim();
      const match = svgText.match(/<svg[\s\S]*<\/svg>/i);

      if (match) {
        const svgCode = match[0];
        document.getElementById('ai-svg-container').innerHTML = svgCode;
        const s = document.getElementById('ai-svg-container').querySelector('svg');
        if (s) { s.style.width = '65%'; s.style.height = '65%'; s.style.maxHeight = '210px'; }
        document.getElementById('ai-status').textContent = `✦ "${menu}" 픽토그램`;
        if (!diary[currentKey]) diary[currentKey] = {};
        diary[currentKey].aiSvg = svgCode;
        diary[currentKey].photo = null;
      } else {
        throw new Error('SVG not found');
      }
    } catch (e) {
      document.getElementById('ai-svg-container').innerHTML =
        `<div style="font-family:'Caveat',cursive;color:#9a8e7c;font-size:15px;text-align:center;">생성 실패 😢<br>다시 시도해보세요</div>`;
    }

    btn.disabled = false; btn.textContent = '✦ AI 그림';
  }

  function saveEntry() {
    const menu = document.getElementById('menu-input').value;
    const memo = document.getElementById('memo-box').value;
    const tags = [...document.querySelectorAll('.tag-chip.selected')].map(c => c.textContent);
    if (!diary[currentKey]) diary[currentKey] = {};
    Object.assign(diary[currentKey], { menu, memo, tags });
    closeDetail();
  }

  renderGrid();
</script>
</body>
</html>
