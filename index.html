<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호랑아밥먹자</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
:root {
  /* 배경을 따뜻한 아이보리 계열로 변경 */
  --bg-color: #f9f7f2; 
  --main-red: #8b0000; /* 제목과 로고에 사용할 동일한 차분한 크림슨 색상 */
  /* 밝아진 배경에 맞춘 부드러운 뉴모피즘 그림자 */
  --shadow-light: #ffffff;
  --shadow-dark: #e3e1dc;
}

body {
  margin:0;
  font-family: 'Arial', sans-serif;
  background: var(--bg-color);
  color: #444;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* 제목 섹션 */
.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.hero h1 {
  font-family: 'Jua', sans-serif;
  font-size: 48px;
  color: var(--main-red); /* 로고와 동일한 색상 사용 */
  margin: 0;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
}

/* 호랑이 아이콘 스타일링 - 쩅함 해결 */
.tiger-logo {
  width: 70px;
  height: auto;
  /* 쨍함을 해결하기 위해 채도(saturate)를 낮추고 밝기(brightness)를 어둡게 조절했습니다.
     흑백 아이콘을 차분한 크림슨(#8b0000) 색상으로 변환하는 필터 수치입니다.
  */
  filter: invert(13%) sepia(87%) saturate(2852%) hue-rotate(352deg) brightness(88%) contrast(110%);
}

/* 메인 카드 레이아웃 */
.app-layout {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 30px;
}

/* 뉴모피즘 카드 스타일 */
.card {
  background: var(--bg-color);
  padding: 25px;
  border-radius: 30px;
  box-shadow: 10px 10px 20px var(--shadow-dark), 
             -10px -10px 20px var(--shadow-light);
  border: none;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 14px;
  color: #776e65;
}

/* 입력 필드 스타일 */
select {
  width: 100%;
  padding: 12px;
  margin-bottom: 25px;
  border-radius: 12px;
  border: none;
  background: var(--bg-color);
  box-shadow: inset 4px 4px 8px var(--shadow-dark), 
             inset -4px -4px 8px var(--shadow-light);
  color: #444;
  outline: none;
}

/* 입체적인 버튼 */
button#recommendBtn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 15px;
  background: var(--main-red); /* 차분한 크림슨 */
  color: white;
  font-size: 20px;
  font-weight: bold;
  font-family: 'Jua', sans-serif;
  cursor: pointer;
  box-shadow: 4px 4px 10px rgba(139, 0, 0, 0.2), 
             -2px -2px 5px rgba(255, 255, 255, 0.3);
  transition: all 0.2s ease;
}

button#recommendBtn:active {
  box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.3);
  transform: translateY(2px);
}

/* 식당 리스트 결과창 */
#result {
  margin-top: 25px;
}

.restaurant-card {
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 20px;
  background: var(--bg-color);
  box-shadow: 5px 5px 10px var(--shadow-dark), 
             -5px -5px 10px var(--shadow-light);
}

.place-name-btn {
  border: none;
  background: none;
  font-family: 'Jua', sans-serif;
  font-size: 22px;
  color: var(--main-red); /* 차분한 크림슨 */
  padding: 0;
  cursor: pointer;
  margin-bottom: 5px;
}

/* 지도 영역 */
#map {
  height: 450px;
  border-radius: 25px;
  background: var(--bg-color);
  box-shadow: inset 8px 8px 16px var(--shadow-dark), 
             inset -8px -8px 16px var(--shadow-light);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #a09a93;
  font-weight: bold;
}

@media(max-width:900px){
  .app-layout{ grid-template-columns: 1fr; }
}
</style>
</head>
