<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호랑아밥먹자</title>

<!-- Jua 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f7fb;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

/* 제목 */
.hero {
  position:relative;
  margin-bottom:20px;
}

.hero h1 {
  font-family: 'Jua', sans-serif;
  font-size:44px;
  color:#000;
  text-shadow:3px 3px 0 #990000;
}

/* 호랑이 */
.tiger {
  position:absolute;
  right:0;
  top:-10px;
  width:90px;
}

/* 메인 카드 (검정) */
.main-card {
  background:#000;
  padding:30px;
  border-radius:25px;
}

/* 레이아웃 */
.app-layout {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* 카드 */
.card {
  background:white;
  padding:18px;
  border-radius:15px;
}

/* 필터 */
select {
  width:100%;
  padding:10px;
  margin:8px 0 12px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* 버튼 */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#990000;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* 식당 카드 */
.restaurant-card {
  border:1px solid #eee;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

/* 식당 이름 */
.place-name-btn {
  border:none;
  background:none;
  font-weight:bold;
  font-size:18px;
  color:#990000;
  cursor:pointer;
}

/* 지도 */
#map {
  height:500px;
  border-radius:12px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}

@media(max-width:900px){
  .app-layout{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>호랑아밥먹자</h1>

    <!-- 🐯 호랑이 아이콘 -->
    <img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" class="tiger">
  </div>

  <div class="main-card">

    <div class="app-layout">

      <!-- 왼쪽 -->
      <div>

        <div class="card">
          <label>음식 종류</label>
          <select id="category">
            <option value="전체">전체</option>
            <option value="한식">한식</option>
            <option value="중식">중식</option>
            <option value="일식">일식</option>
          </select>

          <label>가격</label>
          <select id="price">
            <option value="전체">전체</option>
            <option value="10000">1만원 이하</option>
            <option value="15000">1.5만원 이하</option>
            <option value="20000">2만원 이하</option>
          </select>

          <label>상황</label>
          <select id="mood">
            <option value="전체">전체</option>
            <option value="혼밥">혼밥</option>
            <option value="친구와">친구와</option>
            <option value="데이트">데이트</option>
          </select>

          <button id="recommendBtn">추천받기</button>
        </div>

        <div class="card">
          <div id="result"></div>
        </div>

      </div>

      <!-- 오른쪽 -->
      <div class="card">
        <h3>지도</h3>
        <div id="map">👉 API 연결하면 지도 뜸</div>
        <p>식당 클릭하면 위치 표시됨</p>
      </div>

    </div>

  </div>

</div>

<script>
const restaurants = [
{ name:"우승식당", category:"한식", price:9000, mood:["혼밥"], menu:"제육덮밥" },
{ name:"춘리마라탕", category:"중식", price:12000, mood:["친구와"], menu:"마라탕" },
{ name:"또정초밥", category:"일식", price:18000, mood:["데이트"], menu:"초밥세트" }
];

const resultEl = document.getElementById("result");

function renderResults(items){
resultEl.innerHTML = items.map(r=>`
<div class="restaurant-card">
<button class="place-name-btn">${r.name}</button>
<div>${r.menu}</div>
</div>
`).join("");
}

function recommendMenu(){
const category = document.getElementById("category").value;
const price = document.getElementById("price").value;
const mood = document.getElementById("mood").value;

let filtered = restaurants.filter(r=>{
return (category==="전체"||r.category===category)
&& (price==="전체"||r.price<=price)
&& (mood==="전체"||r.mood.includes(mood));
});

renderResults(filtered);
}

document.getElementById("recommendBtn")
.addEventListener("click", recommendMenu);
</script>

</body>
</html>
