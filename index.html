<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호랑아밥먹자</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>
:root {
  /* 배경을 따뜻한 아이보리 계열로 변경 */
  --bg-color: #f9f7f2; 
  --main-red: #990000;
  /* 밝아진 배경에 맞춘 뉴모피즘 그림자 조절 */
  --shadow-light: #ffffff;
  --shadow-dark: #e3e1dc;
}

body {
  margin:0;
  font-family: 'Arial', sans-serif;
  background: var(--bg-color);
  color: #444;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

/* 제목 섹션 */
.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 40px;
}

.hero h1 {
  font-family: 'Jua', sans-serif;
  font-size: 48px;
  color: var(--main-red);
  margin: 0;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
}

/* 새 호랑이 아이콘 스타일링 */
.tiger-logo {
  width: 70px;
  height: auto;
  /* 이미지를 크림슨 색상으로 입히는 필터 (검정색 아이콘 기준) */
  filter: invert(11%) sepia(87%) saturate(5431%) hue-rotate(352deg) brightness(85%) contrast(115%);
}

/* 메인 카드 레이아웃 */
.app-layout {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 30px;
}

/* 뉴모피즘 카드 스타일 */
.card {
  background: var(--bg-color);
  padding: 25px;
  border-radius: 30px;
  box-shadow: 10px 10px 20px var(--shadow-dark), 
             -10px -10px 20px var(--shadow-light);
  border: none;
}

label {
  display: block;
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 14px;
  color: #776e65; /* 약간 따뜻한 회갈색 */
}

/* 입력 필드 스타일 */
select {
  width: 100%;
  padding: 12px;
  margin-bottom: 25px;
  border-radius: 12px;
  border: none;
  background: var(--bg-color);
  box-shadow: inset 4px 4px 8px var(--shadow-dark), 
             inset -4px -4px 8px var(--shadow-light);
  color: #444;
  outline: none;
}

/* 입체적인 버튼 */
button#recommendBtn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 15px;
  background: var(--main-red);
  color: white;
  font-size: 20px;
  font-weight: bold;
  font-family: 'Jua', sans-serif;
  cursor: pointer;
  box-shadow: 4px 4px 10px rgba(153, 0, 0, 0.2), 
             -2px -2px 5px rgba(255, 255, 255, 0.3);
  transition: all 0.2s ease;
}

button#recommendBtn:active {
  box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.3);
  transform: translateY(2px);
}

/* 식당 리스트 결과창 */
#result {
  margin-top: 25px;
}

.restaurant-card {
  padding: 18px;
  margin-bottom: 15px;
  border-radius: 20px;
  background: var(--bg-color);
  box-shadow: 5px 5px 10px var(--shadow-dark), 
             -5px -5px 10px var(--shadow-light);
}

.place-name-btn {
  border: none;
  background: none;
  font-family: 'Jua', sans-serif;
  font-size: 22px;
  color: var(--main-red);
  padding: 0;
  cursor: pointer;
  margin-bottom: 5px;
}

/* 지도 영역 */
#map {
  height: 450px;
  border-radius: 25px;
  background: var(--bg-color);
  box-shadow: inset 8px 8px 16px var(--shadow-dark), 
             inset -8px -8px 16px var(--shadow-light);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #a09a93;
  font-weight: bold;
}

@media(max-width:900px){
  .app-layout{ grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <img src="free-icon-tiger-4691278.png" alt="호랑이 로고" class="tiger-logo">
    <h1>호랑아 밥먹자</h1>
  </div>

  <div class="app-layout">
    <div>
      <div class="card">
        <label>🍚 음식 종류</label>
        <select id="category">
          <option value="전체">전체</option>
          <option value="한식">한식</option>
          <option value="중식">중식</option>
          <option value="일식">일식</option>
        </select>

        <label>💰 가격대</label>
        <select id="price">
          <option value="전체">전체</option>
          <option value="10000">1만원 이하</option>
          <option value="15000">1.5만원 이하</option>
          <option value="20000">2만원 이하</option>
        </select>

        <label>✨ 상황</label>
        <select id="mood">
          <option value="전체">전체</option>
          <option value="혼밥">혼밥</option>
          <option value="친구와">친구와</option>
          <option value="데이트">데이트</option>
        </select>

        <button id="recommendBtn">오늘 뭐 먹지?</button>
      </div>

      <div id="result">
        </div>
    </div>

    <div class="card">
      <h3 style="margin-top:0; color:#555;">📍 맛집 지도</h3>
      <div id="map">API를 연결하면 지도가 나타납니다</div>
      <p style="text-align:center; font-size:13px; color:#a09a93; margin-top:15px;">식당 이름을 클릭하면 위치가 표시됩니다</p>
    </div>
  </div>
</div>

<script>
/* 기존 스크립트 로직 동일 */
const restaurants = [
  { name:"우승식당", category:"한식", price:9000, mood:["혼밥"], menu:"제육덮밥" },
  { name:"춘리마라탕", category:"중식", price:12000, mood:["친구와"], menu:"마라탕" },
  { name:"또정초밥", category:"일식", price:18000, mood:["데이트"], menu:"초밥세트" }
];

const resultEl = document.getElementById("result");

function renderResults(items){
  if(items.length === 0) {
    resultEl.innerHTML = `<div class="restaurant-card">조건에 맞는 식당이 없어요 🐯</div>`;
    return;
  }
  resultEl.innerHTML = items.map(r=>`
    <div class="restaurant-card">
      <button class="place-name-btn">${r.name}</button>
      <div style="font-size:15px; color:#777;">추천 메뉴: ${r.menu}</div>
    </div>
  `).join("");
}

function recommendMenu(){
  const category = document.getElementById("category").value;
  const price = document.getElementById("price").value;
  const mood = document.getElementById("mood").value;

  let filtered = restaurants.filter(r=>{
    return (category==="전체"||r.category===category)
    && (price==="전체"||r.price<=parseInt(price))
    && (mood==="전체"||r.mood.includes(mood));
  });

  renderResults(filtered);
}

document.getElementById("recommendBtn").addEventListener("click", recommendMenu);
</script>

</body>
</html>
