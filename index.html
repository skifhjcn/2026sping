<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>호랑아밥먹자</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #990000;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .restaurant-card {
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .place-name-btn {
      background: none;
      border: none;
      color: #990000;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
    }

    #map {
      height: 500px;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>호랑아밥먹자</h1>

  <div class="app-layout">

    <!-- 왼쪽 -->
    <div>

      <div class="card">
        <button id="recommendBtn">추천받기</button>
      </div>

      <div class="card">
        <div id="result"></div>
      </div>

    </div>

    <!-- 오른쪽 -->
    <div class="card">
      <h3>지도</h3>
      <div id="map">
        👉 API 연결하면 여기에 지도 뜹니다
      </div>
      <p id="mapStatus">식당 이름을 클릭해보세요</p>
    </div>

  </div>
</div>

<script>
const restaurants = [
  { name: "우승식당", menu: "제육덮밥" },
  { name: "춘리마라탕", menu: "마라탕" },
  { name: "또정초밥", menu: "초밥세트" }
];

const resultEl = document.getElementById("result");

function renderResults() {
  resultEl.innerHTML = restaurants.map((r, i) => `
    <div class="restaurant-card">
      <button class="place-name-btn" data-index="${i}">
        ${r.name}
      </button>
      <div>${r.menu}</div>
    </div>
  `).join("");

  document.querySelectorAll(".place-name-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      alert("👉 지도는 API 연결 후 표시됩니다");
    });
  });
}

document.getElementById("recommendBtn")
  .addEventListener("click", renderResults);
</script>

</body>
</html>
