<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>호랑아밥먹자</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f7fb;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.app-layout {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
}

select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
}

button {
  background:#990000;
  color:white;
  border:none;
  border-radius:10px;
}

.restaurant-card {
  border:1px solid #ddd;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

.place-name-btn {
  border:none;
  background:none;
  font-weight:bold;
  color:#990000;
  cursor:pointer;
  font-size:18px;
}

#map {
  height:500px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>
<div class="container">

<h1>호랑아밥먹자</h1>

<div class="app-layout">

<!-- 왼쪽 -->
<div>

<div class="card">

<label>음식 종류</label>
<select id="category">
<option value="전체">전체</option>
<option value="한식">한식</option>
<option value="중식">중식</option>
<option value="일식">일식</option>
</select>

<label>가격</label>
<select id="price">
<option value="전체">전체</option>
<option value="10000">1만원 이하</option>
<option value="15000">1.5만원 이하</option>
<option value="20000">2만원 이하</option>
</select>

<label>상황</label>
<select id="mood">
<option value="전체">전체</option>
<option value="혼밥">혼밥</option>
<option value="친구와">친구와</option>
<option value="데이트">데이트</option>
<option value="빨리 먹기">빨리 먹기</option>
</select>

<button id="recommendBtn">추천받기</button>

</div>

<div class="card">
<div id="result"></div>
</div>

</div>

<!-- 오른쪽 -->
<div class="card">
<h3>지도</h3>
<div id="map">👉 API 연결하면 지도 뜸</div>
<p id="mapStatus">식당 클릭하면 위치 표시됨</p>
</div>

</div>
</div>

<script>
const restaurants = [
{
name:"우승식당",
category:"한식",
price:9000,
mood:["혼밥","빨리 먹기"],
menu:"제육덮밥"
},
{
name:"춘리마라탕",
category:"중식",
price:12000,
mood:["친구와"],
menu:"마라탕"
},
{
name:"또정초밥",
category:"일식",
price:18000,
mood:["데이트","친구와"],
menu:"초밥세트"
},
{
name:"국민분식",
category:"분식",
price:7000,
mood:["혼밥","빨리 먹기"],
menu:"떡볶이"
}
];

const resultEl = document.getElementById("result");

function renderResults(items){
if(items.length===0){
resultEl.innerHTML="조건에 맞는 식당 없음";
return;
}

resultEl.innerHTML = items.map((r,i)=>`
<div class="restaurant-card">
<button class="place-name-btn">${r.name}</button>
<div>${r.menu}</div>
</div>
`).join("");

document.querySelectorAll(".place-name-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
alert("👉 지도 기능은 API 연결 후 활성화됩니다");
});
});
}

function recommendMenu(){
const category = document.getElementById("category").value;
const price = document.getElementById("price").value;
const mood = document.getElementById("mood").value;

let filtered = restaurants.filter(r=>{
const c = category==="전체" || r.category===category;
const p = price==="전체" || r.price<=Number(price);
const m = mood==="전체" || r.mood.includes(mood);
return c && p && m;
});

renderResults(filtered);
}

document.getElementById("recommendBtn")
.addEventListener("click", recommendMenu);
</script>

</body>
</html>
